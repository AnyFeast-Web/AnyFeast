$kind: http-request
description: Send an SMS message to a client via Twilio and store it in the database.
url: "{{baseUrl}}/messages/send"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "client_id": "c1a2b3c4-d5e6-7890-abcd-ef1234567890",
      "to_phone_number": "+919876543210",
      "body": "Hi Priya! This is a reminder for your consultation tomorrow at 10:30 AM. Please keep your recent blood reports handy. — Dr. Sharma"
    }
order: 2000
